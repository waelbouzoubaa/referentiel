supplier_code: "agenor"
mapping_version: 1
description: "Agenor — entretien bases vie + fournitures consommables (prestations)"
upload_mode: "full"
sharepoint_folder: "agenor"

sheet_match: "Agenor 2026"
header_detection:
  mode: explicit
  row: 8
data_starts_row: 9

extraction_mode: multi_table

tables:
  - name: "entretien_bases_vie"
    description: "Forfait mensuel d'entretien selon taille de base et fréquence"
    zone:
      header_row: 7
      data_rows: "8:17"
      cols: "A:G"
    layout: "matrix_2D"
    col_dimensions:
      - columns: ["B", "C"]
        key: "frequency"
        value: "1x_semaine"
        price_col: "B"
        max_time_col: "C"
      - columns: ["D", "E"]
        key: "frequency"
        value: "2x_semaine"
        price_col: "D"
        max_time_col: "E"
      - columns: ["F", "G"]
        key: "frequency"
        value: "5x_semaine"
        price_col: "F"
        max_time_col: "G"
    product_template:
      designation_template: "Entretien base vie {taille_base_vie} — {frequency}"
      supplier_product_code_template: "AGEN-EBV-{taille_base_vie_slug}-{frequency}"
      family: "Entretien"
      subfamily: "Bases de vie"
    prices:
      - type: "forfait"
        source_col: "B"
        transform: "parse_decimal_fr"
        currency: "EUR"
    attributes:
      - key: "max_monthly_time"
        source_col: "C"
        data_type: "duration"
        unit: "h"
        transform: "parse_duration_fr"

  - name: "fournitures_consommables"
    description: "Forfait mensuel selon nombre de personnes"
    zone:
      header_row: 22
      data_rows: "23:26"
      cols: "A:B"
    layout: "barème_1D"
    product_template:
      designation_template: "Fournitures consommables sanitaires — {tranche_personnes}"
      supplier_product_code_template: "AGEN-FCS-{tranche_personnes_slug}"
      family: "Consommables"
      subfamily: "Sanitaires"
    prices:
      - type: "forfait"
        source_col: "B"
        transform: "parse_decimal_fr"
        currency: "EUR"
    attributes:
      - key: "tranche_personnes"
        source_col: "A"
        data_type: "string"

product_kind: "service"

file_metadata:
  validity_period:
    regex: "Validité de l'offre\\s*:\\s*(\\d{2}/\\d{2}/\\d{4})\\s*au\\s*(\\d{2}/\\d{2}/\\d{4})"
    in_cell: "C2"
    captures:
      validity_start: 1
      validity_end: 2
    transform: "parse_date_fr"
  geographic_scope:
    cell: "A4"

gery_export:
  enabled: false
  blocked_reason: "Modélisation des prestations à valider avec le métier (cf. note d'analyse §5)"
